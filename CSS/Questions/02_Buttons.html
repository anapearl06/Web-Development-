<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style a Button</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            line-height: 1.8;
        }

        h1 {
            color: #2c3e50;
        }

        button {
            margin: 10px;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
        }

        .default {
            background-color: white;
        }

        .primary {
            background-color: royalblue;
            color: white;
            border: none;
        }

        .success {
            background-color: seagreen;
            color: white;
            border: none;
            border-radius: 6px;
        }

        .danger {
            background-color: crimson;
            color: white;
            border: none;
        }

        .outline {
            background-color: white;
            color: royalblue;
            border: 2px solid royalblue;
        }

        .rounded {
            background-color: darkorange;
            color: white;
            border: none;
            border-radius: 30px;
        }

        .shadow {
            background-color: teal;
            color: white;
            border: none;
            box-shadow: 3px 3px 8px gray;
        }

        .hover:hover {
            background-color: black;
            color: white;
        }

        .active:active {
            transform: scale(0.95);
        }

        .disabled {
            background-color: lightgray;
            color: gray;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <h1>CSS Button Styling</h1>

    <h2>1. Default Button</h2>
    <button class="default">Default</button>

    <h2>2. Primary Button</h2>
    <button class="primary">Primary</button>

    <h2>3. Success Button</h2>
    <button class="success">Success</button>

    <h2>4. Danger Button</h2>
    <button class="danger">Delete</button>

    <h2>5. Outline Button</h2>
    <button class="outline">Outline</button>

    <h2>6. Rounded Button</h2>
    <button class="rounded">Rounded</button>

    <h2>7. Shadow Button</h2>
    <button class="shadow">Shadow</button>

    <h2>8. Hover Effect</h2>
    <button class="hover">Hover Me</button>

    <h2>9. Active Effect</h2>
    <button class="active">Click Me</button>

    <h2>10. Disabled Button</h2>
    <button class="disabled" disabled>Disabled</button>

</body>
</html>
