<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #1a1a1a;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background-color: #ffb1e0;
            border-radius: 12px;
            padding: 35px;
            width: 320px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        h2 {
            color: rgb(68, 7, 7);
            text-align: center;
            margin-bottom: 25px;
            font-size: 28px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        input {
            margin-bottom: 18px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgb(91, 11, 11);
            background-color: rgb(54, 111, 152);
            color: white;
            font-size: 15px;
            transition: 0.3s;
        }

        input::placeholder {
            color: #e8e8e8;
        }

        input:focus {
            outline: none;
            border-color: white;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
        }

        button {
            background-color: rgb(6, 191, 247);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: rgb(0, 153, 204);
            transform: translateY(-2px);
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Login Form</h2>

        <form>
            <input type="email" placeholder="Enter your email">
            <input type="password" placeholder="Enter your password">

            <button type="submit">Login</button>
        </form>
    </div>

</body>
</html>
