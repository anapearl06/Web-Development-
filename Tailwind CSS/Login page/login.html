<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login UI</title>

    <link rel="stylesheet" href="./output.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        body{
            font-family:'Poppins',sans-serif;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-900 p-6">

    <!-- Login Card -->
    <div class="w-full max-w-md bg-gray-800 rounded-3xl shadow-2xl border border-gray-700 overflow-hidden">

        <!-- Top Gradient -->
        <div class="h-2 bg-gradient-to-r from-blue-500 via-cyan-400 to-indigo-500"></div>

        <div class="p-8">

            <!-- Logo -->
            <div class="flex justify-center mb-6">

                <div
                    class="w-20 h-20 rounded-full bg-blue-600 flex items-center justify-center text-4xl shadow-lg">

                    🔐

                </div>

            </div>

            <!-- Heading -->

            <h1 class="text-4xl font-bold text-center text-white">
                Welcome Back
            </h1>

            <p class="text-center text-gray-400 mt-3 mb-8 leading-relaxed">
                Sign in to continue to your account and access your dashboard.
            </p>

            <!-- FORM START -->

            <form>

                <!-- EMAIL -->

                <div class="mb-6">

                    <label
                        for="email"
                        class="block text-sm font-semibold text-gray-300 mb-2">

                        Email Address

                    </label>

                    <input

                        id="email"
                        type="email"
                        autocomplete="email"
                        placeholder="Enter your email"

                        class="w-full px-4 py-3 rounded-xl bg-gray-700 border border-gray-600 text-white placeholder-gray-400 transition duration-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">

                </div>

                <!-- PASSWORD -->

                <div class="mb-2">

                    <div class="flex justify-between items-center mb-2">

                        <label
                            for="password"
                            class="text-sm font-semibold text-gray-300">

                            Password

                        </label>

                        <a
                            href="#"
                            class="text-sm text-blue-400 hover:text-blue-300 transition">

                            Forgot Password?

                        </a>

                    </div>

                    <input

                        id="password"
                        type="password"
                        autocomplete="current-password"
                        placeholder="Enter your password"

                        class="w-full px-4 py-3 rounded-xl bg-gray-700 border border-gray-600 text-white placeholder-gray-400 transition duration-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">

                </div>

                <!-- PASSWORD SECTION END -->


                <!-- Remember Me -->

                <div class="flex items-center justify-between mt-6 mb-8">

                    <label class="flex items-center cursor-pointer">

                        <input
                            type="checkbox"
                            class="mr-2 h-4 w-4 accent-blue-600">

                        <span class="text-sm text-gray-300">
                            Remember Me
                        </span>

                    </label>

                    <a
                        href="#"
                        class="text-sm text-blue-400 hover:text-blue-300 transition duration-300">

                        Need Help?

                    </a>

                </div>

                <!-- Login Button -->

                <button
                    type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition duration-300 shadow-lg hover:shadow-xl">

                    Sign In

                </button>

                <!-- Divider -->

                <div class="flex items-center my-8">

                    <div class="flex-1 border-t border-gray-600"></div>

                    <span class="px-4 text-gray-400 text-sm">
                        OR
                    </span>

                    <div class="flex-1 border-t border-gray-600"></div>

                </div>

                <!-- Google Button -->

                <button
                    type="button"
                    class="w-full border border-gray-600 bg-gray-700 hover:bg-gray-600 text-white font-medium py-3 rounded-xl transition duration-300 flex items-center justify-center gap-3">

                    <span class="text-xl">🌐</span>

                    Continue with Google

                </button>

            </form>

            <!-- Footer -->

            <div class="mt-8 text-center">

                <p class="text-gray-400">

                    Don't have an account?

                    <a
                        href="#"
                        class="text-blue-400 hover:text-blue-300 font-semibold transition duration-300">

                        Create Account

                        <h1 class="text-3xl font-bold text-red-500 text-center">
                        Tailwind Working 🚀
                            </h1>

                    </a>

                </p>

            </div>

        </div>

    </div>

</body>
</html>
